# Frozen training/eval protocol v2 (semantic completeness on top of Plan-B).
#
# Update policy (MUST follow):
# - Do NOT edit this file in place once it has been used for any reported result.
# - If protocol must change: create `protocol_v3.yaml` and (optionally) repoint `docs/protocol.yaml`.
#
# Context:
# - Stage-1 (already frozen evidence): Plan-B under protocol_v1 (see v26 report-pack).
# - Stage-2 goal: align opening proposal by adding semantic/feature constraints + editable demo,
#   without breaking the stage-1 evidence chain.

id: selfcap_bar_8cam60f_protocol_v2
frozen_date: "2026-02-27"

storyline:
  stage1_physical:
    name: planb_velocity_init
    claim: "Plan-B provides a physically plausible velocity prior and avoids bad velocity bases."
    evidence: "Reuse v26 (protocol_v1) report-pack as stage-1 final evidence."
  stage2_semantic:
    name: vggt_geometric_semantic_prior
    claim: "On top of Plan-B, add feasible VGGT-based feature metric / consistency to improve alignment."

deliverables:
  stage2_must_include:
    - name: static_dynamic_split_render
      goal: "Demonstrate editable rendering via velocity-threshold static/dynamic layers."
      artifacts:
        - static_only_video
        - dynamic_only_video
        - velocity_histogram_and_threshold_note
    - name: vggt_feature_or_pseudomask_visualization
      goal: "Show what VGGT cues look like (PCA/cluster/overlay), even if not used as hard supervision."
      artifacts:
        - multi_view_feature_viz_images
        - short_note_about_consistency_and_failure_cases
    - name: planb_plus_vggt_feature_metric_loss
      goal: "Re-run feature metric loss on top of Plan-B with warmup+ramp and auditable configs."
      minimum_runs:
        - smoke200_trend_check
        - full600_at_least_one (if budget allows)
  optional_addons:
    - name: attention_guided_sparse_correspondence
      timebox_hours: 72
      constraints:
        - "patch/token-level only"
        - "top-k sparse matching"
        - "must include correspondence visualization"

dataset:
  root: "data/selfcap_bar_8cam60f"
  frames:
    start: 0
    end_exclusive: 60
  cameras:
    used: ["02", "03", "04", "05", "06", "07", "08", "09"]
    train: ["02", "03", "04", "05", "06", "07"]
    val: ["08"]
    test: ["09"]
  image_downscale: 2

reproducibility:
  seed: 42
  evidence_policy:
    - "All protocol_v2 runs must write configs/flags to logs (no silent defaults)."
    - "All qualitative demos must be reproducible from a saved ckpt + export script/command."

training:
  config_name: "default_keyframe_small"
  keyframe_step: 5
  global_scale: 6
  max_steps_full: 600
  render_traj_path: "fixed"
  eval:
    compute_on: ["val", "test"]
    sample_every_val: 1
    sample_every_test: 1
  eval_steps_full: [600]
  save_steps_full: [600]

metrics:
  primary_test_cam_mean: ["psnr", "ssim", "lpips"]
  stability_test_cam_mean:
    - tlpips  # LPIPS(pred_t, pred_{t-1}) on consecutive frames of test cam

baselines:
  - name: baseline_freetime_vanilla
    protocol: protocol_v1
    notes: "Reference baseline under the same dataset/split/steps."
  - name: planb_init
    protocol: protocol_v1
    notes: "Stage-1 physical prior (final evidence lives in v26 report-pack)."

stage2_experiments:
  planb_plus_vggt_feature_metric:
    entrypoint_script: "scripts/run_train_planb_feature_loss_v2_selfcap.sh"
    recommended:
      warmup_steps: 100
      ramp_steps: 400
      lambda_candidates: [0.005, 0.01]
      loss_type: "cosine"
      phi_name: "token_proj"  # auditable via cache/meta.json
    stoploss:
      - "PSNR/LPIPS/tLPIPS all worse than planb_init at full600"
      - "training instability within smoke200"

qualitative_demos:
  static_dynamic_split:
    export_mode: "trainer --export-only + export_vel_filter"
    threshold_selection:
      method: "velocity magnitude histogram; choose τ so static retains most background while removing obvious movers"
      require_note: true

