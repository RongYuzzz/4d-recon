# Frozen training/eval protocol (single source of truth)
#
# Update policy (MUST follow):
# - Do NOT edit this file in place once it has been used for any reported result.
# - If protocol must change: create `protocol_v2.yaml` and update `docs/protocol.yaml`.
#
# Context:
# - Main repo: `~/projects/4d-recon`
# - Canonical dataset: `data/selfcap_bar_8cam60f` (SelfCap bar, 8 cams x 60 frames)

id: selfcap_bar_8cam60f_protocol_v1
frozen_date: "2026-02-24"

deliverables:
  midterm:
    must_include:
      - baseline_freetime_vanilla
      - ours_weak (VGGT cue mining; fallback allowed)
      - stoploss_and_next_steps
    vggt_stoploss:
      timebox_hours: 24
      fail_conditions:
        - cue_all_black_or_all_white
        - cue_random_noise_or_severe_temporal_flicker
      fallback:
        - baseline_plus_cue_failure_analysis
        - ours_weak_placeholder (diff backend + temporal smoothing)
  final:
    main_scene: selfcap_bar_8cam60f
    anti_cherrypick:
      required: true
      options:
        - second_scene_shortrun
        - second_segment_shortrun
    ours_strong:
      required: attempt_and_audit  # success is NOT mandatory, but attempts must be auditable

dataset:
  root: "data/selfcap_bar_8cam60f"
  frames:
    start: 0
    end_exclusive: 60
  cameras:
    used: ["02", "03", "04", "05", "06", "07", "08", "09"]
    train: ["02", "03", "04", "05", "06", "07"]
    val: ["08"]
    test: ["09"]
  image_downscale: 2

reproducibility:
  seed: 42
  allow_tuning_only:
    # Baseline hyperparams are frozen; only Ours-specific weights may be tuned.
    - ours_weak.lambda_cue
    - ours_strong.*

training:
  config_name: "default_keyframe_small"
  keyframe_step: 5
  global_scale: 6
  max_steps_full: 600
  render_traj_path: "fixed"
  eval:
    compute_on: ["val", "test"]
    sample_every_val: 1
    sample_every_test: 1
  eval_steps_full: [600]
  save_steps_full: [600]

metrics:
  primary_test_cam_mean: ["psnr", "ssim", "lpips"]
  stability_test_cam_mean:
    - tlpips  # LPIPS(pred_t, pred_{t-1}) on consecutive frames of test cam

baselines:
  - name: baseline_freetime_vanilla
    notes: "Audited FreeTimeGsVanilla (current mainline) under this protocol."
  - name: zero_velocity_ablation
    notes: "T0 audit: force v=0 to verify degeneration to static + gradient signal sanity."
  - name: control_weak_no_cue
    notes: "Same weak-fusion code path but constant weight map (no cue)."

audits:
  t0:
    config_name: "default_keyframe_small"
    max_steps: 200
    global_scale: 12
    keyframe_step: 5

ours_weak:
  cue_mining:
    backend: "vggt"
    fallback_backend: "diff"
    output_npz: "outputs/cue_mining/selfcap_bar_8cam60f_v1/pseudo_masks.npz"
    mask_downscale: 4
    temporal_smoothing: "median3"
  loss_injection:
    type: mask_weighted_photometric
    definition: "L1 weighted by W(u) in [0,1] (normalized by mean weight)."
  lambda_cue_default: 0.5
  apply_until_step: 600

ours_strong:
  timebox_hours: 72
  max_full_runs: 3
  stoploss:
    - training_unstable_within_2000_steps
    - no_trend_vs_weak
    - correspondence_precision_not_defensible
  required_artifacts:
    - matching_viz
    - loss_curves
    - failure_analysis

